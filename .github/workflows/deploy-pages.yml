name: Deploy forecast to GitHub Pages

# Optional: use after enabling Pages → Source: GitHub Actions in repo settings.
# Default setup uses branch deploy (main /docs) — no workflow required.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate forecast HTML
        run: |
          python scripts/show_forecast.py docs/data/wc2026_forecast.json \
            --html docs/index.html --no-print

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
